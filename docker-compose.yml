services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: bearcoderr_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_db}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - bearcoderr_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-portfolio_user} -d $${POSTGRES_DB:-portfolio_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bearcoderr_api
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-portfolio_user}:${POSTGRES_PASSWORD:-strong_password_here_123}@postgres:5432/${POSTGRES_DB:-portfolio_db}

      # Application
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-True}
      API_PORT: ${API_PORT:-8000}

      # CORS
      ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:3001","https://yourdomain.com"]'


      # Security
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}

    ports:
      - "${API_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bearcoderr_network
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # PgAdmin (опционально, для управления БД)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bearcoderr_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    networks:
      - bearcoderr_network
    volumes:
      - pgadmin_data:/var/lib/pgadmin


  migrations:
    build: .
    working_dir: /app
    command: alembic -c /app/alembic.ini upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bearcoderr_network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  bearcoderr_network:
    driver: bridge